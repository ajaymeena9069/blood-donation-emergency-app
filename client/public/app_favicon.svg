<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium 3D-like red gradient -->
    <linearGradient id="bloodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="40%" stop-color="#e60000" />
      <stop offset="100%" stop-color="#8a0000" />
    </linearGradient>
    
    <!-- Subtle glow/drop shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#8a0000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Blood Drop Shape -->
  <path d="M 50 10 
           C 50 10, 15 50, 15 70 
           A 35 35 0 1 0 85 70 
           C 85 50, 50 10, 50 10 Z" 
        fill="url(#bloodGrad)" 
        filter="url(#glow)"/>

  <!-- Modern White Heartbeat Line inside the drop -->
  <path d="M 30 70 L 40 70 L 45 55 L 55 85 L 60 70 L 70 70" 
        fill="transparent" 
        stroke="#ffffff" 
        stroke-width="4.5" 
        stroke-linejoin="round" 
        stroke-linecap="round"/>
</svg>
